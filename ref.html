<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Te invitan a NexWeb Network</title>
<meta name="description" content="Un negocio de la red NexWeb te invita a tener tu página web con IA incluida desde $199/mes."/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Space Grotesk',sans-serif;background:#04060d;color:#f0f4ff;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.card{background:#0a0f1e;border:1px solid #243050;border-radius:24px;padding:40px;max-width:480px;width:100%;text-align:center;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:0.1em;background:linear-gradient(90deg,#60a5fa,#22d3ee,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:28px;display:block;}
.ref-icon{width:72px;height:72px;border-radius:18px;background:linear-gradient(135deg,#1d4ed8,#0891b2);display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 20px;box-shadow:0 0 32px rgba(37,99,235,0.3);}
.ref-from{font-size:13px;color:#475569;font-family:'JetBrains Mono',monospace;margin-bottom:6px;}
.ref-name{font-size:22px;font-weight:700;margin-bottom:6px;color:#f0f6ff;}
.ref-type{font-size:13px;color:#475569;margin-bottom:24px;}
.divider{border:none;border-top:1px solid #1a2540;margin:24px 0;}
h1{font-size:20px;font-weight:700;margin-bottom:10px;line-height:1.3;}
h1 span{background:linear-gradient(90deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
p{font-size:13px;color:#94a3b8;line-height:1.6;margin-bottom:24px;}
.benefits{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:24px;text-align:left;}
.ben{background:#0f1628;border:1px solid #1a2540;border-radius:10px;padding:12px;}
.ben-icon{font-size:18px;margin-bottom:4px;}
.ben-title{font-size:12px;font-weight:600;margin-bottom:2px;}
.ben-desc{font-size:11px;color:#475569;line-height:1.4;}
.cta{display:block;width:100%;padding:15px;background:linear-gradient(135deg,#1d4ed8,#2563eb);border-radius:12px;color:#fff;text-decoration:none;font-weight:700;font-size:15px;margin-bottom:12px;box-shadow:0 8px 24px rgba(37,99,235,0.4);}
.sec-cta{display:block;width:100%;padding:13px;background:transparent;border:1px solid #243050;border-radius:12px;color:#94a3b8;text-decoration:none;font-size:13px;}
.loading{color:#475569;font-family:'JetBrains Mono',monospace;font-size:13px;padding:40px;}
</style>
</head>
<body>

<div class="card">
  <span class="logo">Nexweb Studio</span>
  <div id="content"><div class="loading">Cargando...</div></div>
</div>

<script>
const SB_URL='https://tsrbfazdcpbvufqtnvtx.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzcmJmYXpkY3BidnVmcXRudnR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDUxOTUsImV4cCI6MjA4ODQ4MTE5NX0.0IcZI-9dorqHYuuKZ_2CdhlssPYjFBnCNWCb_yIK5FU';
const sb=supabase.createClient(SB_URL,SB_KEY);

async function init(){
  // Get ref code from URL: /ref/CODIGO or ?ref=CODIGO
  const path=window.location.pathname;
  const parts=path.split('/').filter(Boolean);
  const refCode=parts[parts.length-1]||new URLSearchParams(window.location.search).get('ref')||'';

  if(!refCode||refCode==='ref'){
    showGeneric();return;
  }

  const {data}=await sb.from('clients').select('*').eq('ref_code',refCode).eq('status','activo').single();

  if(!data){showGeneric();return;}

  const waMsg=encodeURIComponent(`Hola Juan, me invitó ${data.name} y quiero saber más sobre NexWeb Studio`);
  document.getElementById('content').innerHTML=`
    <div class="ref-icon">🤝</div>
    <div class="ref-from">Te invita a la red NexWeb</div>
    <div class="ref-name">${data.name}</div>
    <div class="ref-type">${data.type||''} ${data.city?'· '+data.city:''}</div>
    <hr class="divider"/>
    <h1>Tu negocio merece una página <span>que trabaje por ti</span></h1>
    <p>NexWeb Studio te hace una página web profesional con IA incluida. Sin tecnicismos, sin contratos. Desde $199/mes.</p>
    <div class="benefits">
      <div class="ben"><div class="ben-icon">🔒</div><div class="ben-title">Precio especial</div><div class="ben-desc">Por venir referido tienes precio preferencial.</div></div>
      <div class="ben"><div class="ben-icon">🌐</div><div class="ben-title">Red de negocios</div><div class="ben-desc">Te conectamos con toda la red NexWeb.</div></div>
      <div class="ben"><div class="ben-icon">🤖</div><div class="ben-title">IA incluida</div><div class="ben-desc">Tu página responde clientes 24/7 sola.</div></div>
      <div class="ben"><div class="ben-icon">🚀</div><div class="ben-title">Lista en 48hrs</div><div class="ben-desc">Diseño único, no templates genéricos.</div></div>
    </div>
    <a href="https://wa.me/12148011100?text=${waMsg}" class="cta" target="_blank">📲 Quiero mi página — hablar con Juan</a>
    <a href="index.html" class="sec-cta">Ver más sobre NexWeb Studio →</a>
  `;
}

function showGeneric(){
  document.getElementById('content').innerHTML=`
    <div class="ref-icon">🌐</div>
    <div class="ref-from">Bienvenido a</div>
    <div class="ref-name">NexWeb Network</div>
    <hr class="divider"/>
    <h1>Tu negocio merece una página <span>que trabaje por ti</span></h1>
    <p>Páginas web profesionales con IA incluida para negocios mexicanos. Desde $199/mes, sin contratos.</p>
    <a href="https://wa.me/12148011100?text=Hola%20Juan%2C%20me%20interesa%20una%20p%C3%A1gina%20para%20mi%20negocio" class="cta" target="_blank">📲 Hablar con Juan</a>
    <a href="index.html" class="sec-cta">Ver planes y precios →</a>
  `;
}

init();
</script>
</body>
</html>
