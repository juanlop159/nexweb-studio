<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>NexWeb — Tu nueva página web</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #f5f5f7;
  --surface:   #ffffff;
  --surface2:  #fafafa;
  --text:      #1d1d1f;
  --text2:     #424245;
  --muted:     #6e6e73;
  --muted2:    #aeaeb2;
  --sep:       rgba(0,0,0,0.08);
  --blue:      #0071e3;
  --blue-dim:  rgba(0,113,227,0.1);
  --green:     #34c759;
  --red:       #ff3b30;
  --sh1:       0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
  --sh2:       0 2px 8px rgba(0,0,0,0.05), 0 16px 40px rgba(0,0,0,0.08);
  --sh3:       0 4px 20px rgba(0,0,0,0.06), 0 24px 60px rgba(0,0,0,0.1);
  --r:         14px;
  --r-sm:      10px;
  --r-pill:    999px;
  --font:      'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
}

html, body { height: 100%; overflow: hidden; background: var(--bg); }
body {
  font-family: var(--font);
  color: var(--text);
  display: flex; flex-direction: column;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ─── TOP BAR ─── */
.topbar {
  height: 50px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px;
  background: rgba(255,255,255,0.82);
  backdrop-filter: saturate(180%) blur(24px);
  -webkit-backdrop-filter: saturate(180%) blur(24px);
  border-bottom: 1px solid var(--sep);
  position: relative; z-index: 20;
}
.tb-logo { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; color: var(--text); }
.tb-logo b { color: var(--blue); font-weight: 800; }
.tb-right { font-size: 12px; color: var(--muted); font-weight: 500; text-align: right; }
.tb-progress {
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: var(--sep); overflow: hidden;
}
.tb-progress-fill {
  height: 100%; background: var(--blue);
  border-radius: 0; transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  width: 5%;
}

/* ─── MAIN ─── */
.main { display: flex; flex: 1; overflow: hidden; }

/* ─── SIDE PANEL ─── */
.side {
  width: 252px; flex-shrink: 0;
  border-right: 1px solid var(--sep);
  padding: 20px 16px;
  overflow-y: auto;
  background: rgba(255,255,255,0.5);
  backdrop-filter: blur(8px);
  display: flex; flex-direction: column; gap: 8px;
}
.side::-webkit-scrollbar { width: 0; }
.side-title {
  font-size: 10px; font-weight: 600; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.1em;
  padding-bottom: 10px; border-bottom: 1px solid var(--sep);
  margin-bottom: 2px;
}
.sc {
  background: var(--surface);
  border: 1px solid var(--sep);
  border-radius: var(--r-sm);
  padding: 11px 13px;
  box-shadow: var(--sh1);
  transition: border-color 0.4s, background 0.4s;
}
.sc.lit { border-color: rgba(0,113,227,0.22); background: rgba(0,113,227,0.02); }
.sc-l {
  font-size: 10px; font-weight: 600; color: var(--muted2);
  text-transform: uppercase; letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.sc-v {
  font-size: 12px; font-weight: 500; color: var(--muted2);
  line-height: 1.5; min-height: 15px; transition: color 0.3s;
  white-space: pre-line;
}
.sc-v.filled {
  color: var(--text);
  animation: vPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes vPop { from { opacity:0; transform:translateY(2px); } to { opacity:1; transform:none; } }

/* ─── CHAT ─── */
.chat { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.msgs {
  flex: 1; overflow-y: auto;
  padding: 28px 28px 12px;
  display: flex; flex-direction: column; gap: 18px;
  scroll-behavior: smooth;
}
.msgs::-webkit-scrollbar { width: 0; }

/* AI row */
.ra {
  display: flex; align-items: flex-end; gap: 9px;
  max-width: 78%;
  animation: mIn 0.28s cubic-bezier(0.4,0,0.2,1);
}
@keyframes mIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }

.av {
  width: 30px; height: 30px; flex-shrink: 0;
  border-radius: 9px;
  background: linear-gradient(150deg, #0055b3, #0071e3);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 800; color: #fff;
  box-shadow: 0 2px 8px rgba(0,113,227,0.28);
  letter-spacing: -0.03em;
}
.ab {
  background: var(--surface);
  border: 1px solid var(--sep);
  border-radius: 18px 18px 18px 5px;
  padding: 13px 17px;
  font-size: 15px; line-height: 1.65; color: var(--text);
  box-shadow: var(--sh2);
}
.ab strong { font-weight: 700; }

/* User row */
.ru {
  display: flex; justify-content: flex-end;
  animation: mIn 0.22s cubic-bezier(0.4,0,0.2,1);
}
.ub {
  background: var(--blue);
  border-radius: 18px 18px 5px 18px;
  padding: 13px 17px;
  font-size: 15px; line-height: 1.55; color: #fff;
  max-width: 72%;
  box-shadow: 0 4px 14px rgba(0,113,227,0.22);
}

/* Typing */
.rt {
  display: flex; align-items: flex-end; gap: 9px;
  max-width: 78%;
  animation: mIn 0.28s ease;
}
.tb {
  background: var(--surface); border: 1px solid var(--sep);
  border-radius: 18px 18px 18px 5px;
  padding: 14px 18px;
  display: flex; align-items: center; gap: 5px;
  box-shadow: var(--sh2);
}
.td {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--muted2);
  animation: tdB 1.2s ease-in-out infinite;
}
.td:nth-child(2) { animation-delay: 0.14s; }
.td:nth-child(3) { animation-delay: 0.28s; }
@keyframes tdB {
  0%,60%,100% { transform: none; background: var(--muted2); }
  30% { transform: translateY(-8px); background: var(--blue); }
}

/* ─── CHIPS ─── */
.chips {
  display: flex; flex-wrap: wrap; gap: 7px;
  padding: 2px 28px 12px 67px;
}
.chip {
  padding: 8px 15px;
  background: var(--surface); border: 1px solid var(--sep);
  border-radius: var(--r-pill);
  font-size: 13px; font-weight: 500; color: var(--blue);
  cursor: pointer; user-select: none;
  box-shadow: var(--sh1);
  transition: all 0.15s cubic-bezier(0.4,0,0.2,1);
  animation: cIn 0.28s cubic-bezier(0.34,1.56,0.64,1) both;
}
.chip:hover { background: var(--blue-dim); border-color: rgba(0,113,227,0.25); transform: translateY(-1px); box-shadow: var(--sh2); }
.chip:active { transform: scale(0.96); }
@keyframes cIn { from { opacity:0; transform:scale(0.72); } to { opacity:1; transform:none; } }

/* ─── INPUT ─── */
.inp-outer {
  padding: 10px 28px 26px;
  border-top: 1px solid var(--sep);
  background: rgba(245,245,247,0.9);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  flex-shrink: 0;
}
.inp-row {
  display: flex; align-items: flex-end; gap: 9px;
  background: var(--surface);
  border: 1.5px solid var(--sep);
  border-radius: 18px;
  padding: 10px 10px 10px 17px;
  box-shadow: var(--sh1);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.inp-row:focus-within {
  border-color: var(--blue);
  box-shadow: 0 0 0 3.5px rgba(0,113,227,0.12), var(--sh1);
}
#ui {
  flex: 1; background: transparent; border: none; outline: none;
  color: var(--text); font-size: 15px; font-family: var(--font);
  font-weight: 400; resize: none; max-height: 120px;
  line-height: 1.5; padding: 3px 0;
}
#ui::placeholder { color: var(--muted2); }
.sb {
  width: 36px; height: 36px; flex-shrink: 0;
  background: var(--blue); border: none; border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,113,227,0.28);
  transition: all 0.16s cubic-bezier(0.4,0,0.2,1);
}
.sb:hover { background: #0077ed; transform: scale(1.06); box-shadow: 0 4px 14px rgba(0,113,227,0.38); }
.sb:active { transform: scale(0.94); }
.sb:disabled { opacity: 0.28; cursor: not-allowed; transform: none; box-shadow: none; }
.sb svg { width: 15px; height: 15px; fill: white; }
.inp-hint { font-size: 11px; color: var(--muted2); text-align: center; margin-top: 7px; font-weight: 400; }

/* ─── SUMMARY CARD ─── */
.sum {
  background: var(--surface);
  border: 1px solid var(--sep);
  border-radius: 20px;
  padding: 28px;
  margin: 0 6px 20px;
  box-shadow: var(--sh3);
  animation: mIn 0.45s cubic-bezier(0.4,0,0.2,1);
}
.sum-eye { font-size: 11px; font-weight: 600; color: var(--blue); letter-spacing: 0.04em; margin-bottom: 5px; text-transform: uppercase; }
.sum-h { font-size: 22px; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 8px; }
.sum-p { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 22px; }
.sum-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 22px; }
.si { background: var(--bg); border-radius: var(--r-sm); padding: 10px 13px; }
.si-l { font-size: 10px; font-weight: 600; color: var(--muted2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 3px; }
.si-v { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.4; }
.sum-btn {
  display: flex; align-items: center; justify-content: center; gap: 9px;
  width: 100%; padding: 15px;
  background: var(--green); border: none; border-radius: 13px;
  color: #fff; font-size: 15px; font-weight: 600;
  font-family: var(--font); text-decoration: none; cursor: pointer;
  transition: all 0.18s; box-shadow: 0 4px 18px rgba(52,199,89,0.28);
  letter-spacing: -0.01em;
}
.sum-btn:hover { filter: brightness(1.05); transform: translateY(-1px); box-shadow: 0 8px 26px rgba(52,199,89,0.35); }
.sum-note { font-size: 12px; color: var(--muted2); text-align: center; margin-top: 10px; }

/* ─── MOBILE ─── */
@media (max-width: 680px) {
  .side { display: none; }
  .msgs { padding: 20px 16px 10px; }
  .chips { padding: 2px 16px 10px 55px; }
  .inp-outer { padding: 8px 16px 22px; }
  .ra, .rt { max-width: 94%; }
  .ub { max-width: 88%; }
}
</style>
</head>

<script>
// ─── CONFIG ───
const SB_URL  = 'https://tsrbfazdcpbvufqtnvtx.supabase.co';
const SB_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRzcmJmYXpkY3BidnVmcXRudnR4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI5MDUxOTUsImV4cCI6MjA4ODQ4MTE5NX0.0IcZI-9dorqHYuuKZ_2CdhlssPYjFBnCNWCb_yIK5FU';
const GROQ_URL = '/api/groq';

// ─── URL PARAMS (for admin-generated links) ───
const params  = new URLSearchParams(window.location.search);
const PRE_NAME = params.get('cliente') || '';   // e.g. "OB Barbería"
const PRE_CODE = params.get('code')    || '';   // access code

// ─── STATE ───
const msgsEl = document.getElementById('msgs');
const inputEl = document.getElementById('ui');
const sbEl    = document.getElementById('sb');
const chipsEl = document.getElementById('chips');

let history = [], brief = {}, qCount = 0, busy = false, done = false;

// Pre-fill name from URL
if (PRE_NAME) brief.name = PRE_NAME;

// ─── PANEL MAP ───
const PM = { name:0, type:1, city:1, services:2, vibe:3, goal:4,
             differentiator:5, target:5, whatsapp:6, instagram:6, hours:6 };

// ─── SYSTEM PROMPT ───
const SYS = `Eres el asistente de onboarding de NexWeb Studio. Tu misión: entrevistar al cliente para crear el brief perfecto de su página web.

REGLAS ABSOLUTAS:
1. Haz UNA sola pregunta por mensaje. Jamás más de una.
2. Sé natural, cálido y directo. Amigo experto, no formulario.
3. Adapta CADA pregunta al nicho específico del cliente desde que lo detectas.
4. Haz entre 8-10 preguntas en total.
5. SIEMPRE incluye al inicio un JSON con datos extraídos: <!--D:{...}-->
6. Cuando aplique, incluye al FINAL chips de respuesta rápida: <!--C:op1|op2|op3-->
${PRE_NAME ? `\nIMPORTANTE: Ya sabemos que el negocio se llama "${PRE_NAME}". NO preguntes el nombre — ya lo tienes guardado. Empieza directamente por el giro/tipo de negocio y adapta el flujo desde la pregunta 1.` : ''}

ADAPTACIÓN POR NICHO (aplica desde que lo detectas):
- Barbería/Salón: cortes top, precios, walk-in vs citas, cuántos barberos/estilistas, si hacen barba
- Gym/Calistenia: clases, membresías, presencial u online, niveles, horarios pico
- Restaurante: cocina, 2-3 especialidades, precio promedio por persona, delivery, tipo de ambiente
- Spa/Estética: tratamientos, público (hombres/mujeres/mixto), precios, si tienen paquetes o membresías
- Boutique/Moda: tipo de ropa, rango de precio, si venden en línea, marcas que manejan
- Clínica/Salud: especialidades, seguros que aceptan, costo primera consulta, número de médicos
- Fotografía: tipo (bodas/comercial/retratos), precio sesión, entrega de fotos, estilo visual
- Servicios generales: qué exactamente, zona de cobertura, cómo cobran, tiempo de entrega

FLUJO (adapta al nicho):
1. ${PRE_NAME ? 'Giro/tipo de negocio (el nombre ya lo sabemos)' : 'Nombre del negocio + giro'}
2. Ciudad y colonia
3. Servicios principales con precios (específico al nicho)
4. Personalidad y vibe para la página
5. Objetivo principal (citas, WhatsApp, portafolio, venta online)
6. Qué los hace únicos vs la competencia local
7. A quién le venden (perfil del cliente ideal)
8. Datos de contacto: WhatsApp, Instagram, horario
9. Si tienen fotos, logo o colores definidos
10. Algo especial a destacar

CAMPOS JSON: name, type, city, services, vibe, goal, differentiator, target, whatsapp, instagram, hours, hasLogo, colors, notes

Cuando tengas 8-10 respuestas sólidas, cierra con <!--DONE--> al final de tu mensaje.

TONO: Conversacional, cercano, profesional. Emojis con moderación. Sin asteriscos en las preguntas.`;

// ─── INIT ───
async function init() {
  // Update topbar with client name if known
  if (PRE_NAME) {
    document.getElementById('tbLabel').textContent = PRE_NAME;
    updatePanel({ name: PRE_NAME });
  }

  await sleep(450);
  showTyping();
  await sleep(1000);
  hideTyping();

  let opener;
  let startChips;

  if (PRE_NAME) {
    opener = `¡Hola! 👋 Soy el asistente de NexWeb Studio.\n\nJuan ya me compartió que se llaman **${PRE_NAME}**. Voy a hacerte unas preguntas rápidas para diseñar la página perfecta — sin tecnicismos, menos de 5 minutos.\n\n¿A qué se dedica **${PRE_NAME}** exactamente?`;
    startChips = ['Es una barbería','Es un gym o calistenia','Es un restaurante','Es un spa o estética','Es una clínica','Vende ropa / boutique','Es fotografía','Otro giro'];
  } else {
    opener = `¡Hola! 👋 Soy el asistente de NexWeb Studio.\n\nVoy a hacerte unas preguntas para diseñar la página perfecta para tu negocio — sin tecnicismos, va a ser rápido y fácil.\n\n¿Cómo se llama tu negocio y a qué se dedica?`;
    startChips = ['Tengo una barbería','Es un gym o fitness','Tengo un restaurante','Es un spa o estética','Tengo una clínica','Vendo ropa / boutique','Soy fotógrafo/a','Otro negocio'];
  }

  history.push({ role: 'assistant', content: opener });
  await typeAI(opener);
  await sleep(300);
  showChips(startChips);
  unlock();
  setProgress(1);
}

// ─── SEND ───
async function send() {
  const txt = inputEl.value.trim();
  if (!txt || busy || done) return;
  clearChips();
  appendUser(txt);
  history.push({ role: 'user', content: txt });
  inputEl.value = ''; rsz(inputEl);
  lock(); busy = true; qCount++;

  showTyping();
  try {
    const res = await fetch(GROQ_URL, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 500,
        temperature: 0.72,
        messages: [{ role: 'system', content: SYS }, ...history]
      })
    });

    if (!res.ok) {
      const errBody = await res.text();
      throw new Error(`API ${res.status}: ${errBody}`);
    }

    const data = await res.json();
    hideTyping();

    const raw = data.choices?.[0]?.message?.content
      || 'Disculpa, hubo un error de conexión. ¿Puedes intentar de nuevo?';
    history.push({ role: 'assistant', content: raw });

    // Extract structured data
    const dm = raw.match(/<!--D:(\{.*?\})-->/s);
    if (dm) {
      try {
        const x = JSON.parse(dm[1]);
        Object.assign(brief, x);
        updatePanel(x);
      } catch(e) {}
    }

    // Check if conversation is done
    const isDone = /<!--DONE-->/.test(raw) || qCount >= 10;

    // Extract quick-reply chips
    const cm = raw.match(/<!--C:(.*?)-->/);
    const chips = cm ? cm[1].split('|').map(s => s.trim()).filter(Boolean) : [];

    // Clean message for display
    const disp = raw
      .replace(/<!--D:\{.*?\}-->/gs, '')
      .replace(/<!--C:.*?-->/g, '')
      .replace(/<!--DONE-->/g, '')
      .trim();

    await typeAI(disp);

    if (isDone) { await sleep(600); showSummary(); done = true; }
    else { if (chips.length) showChips(chips); unlock(); }

    setProgress(Math.min(qCount + 1, 9));

  } catch(e) {
    hideTyping();
    console.error('Groq error:', e);
    appendAI(`Hubo un problema técnico (${e.message}). Espera un momento y vuelve a intentarlo.`);
    unlock();
  }
  busy = false;
}

// ─── TYPEWRITER ───
function typeAI(text) {
  return new Promise(resolve => {
    const wrap = document.createElement('div');
    wrap.className = 'ra';
    const av = document.createElement('div');
    av.className = 'av'; av.textContent = 'N';
    const bub = document.createElement('div');
    bub.className = 'ab';
    wrap.append(av, bub);
    msgsEl.appendChild(wrap);
    scrollB();

    const html = text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');

    // Fast-track very short messages
    if (html.length < 30) { bub.innerHTML = html; resolve(); return; }

    const chars = html.split('');
    let i = 0, out = '', inTag = false;
    const spd = Math.max(6, Math.min(20, 1500 / chars.length));

    const iv = setInterval(() => {
      if (i >= chars.length) {
        clearInterval(iv); bub.innerHTML = html; resolve(); return;
      }
      const c = chars[i];
      if (c === '<') inTag = true;
      out += c;
      if (c === '>') inTag = false;
      bub.innerHTML = out + (!inTag
        ? '<span style="opacity:.25;color:var(--blue)">▌</span>'
        : '');
      i++;
      if (i % 6 === 0) scrollB();
    }, spd);

    // Hard timeout fallback
    setTimeout(() => { clearInterval(iv); bub.innerHTML = html; resolve(); }, spd * chars.length + 200);
  });
}

// ─── CHIPS ───
function showChips(arr) {
  chipsEl.innerHTML = '';
  arr.forEach((c, i) => {
    const el = document.createElement('div');
    el.className = 'chip';
    el.style.animationDelay = (i * 0.06) + 's';
    el.textContent = c;
    el.onclick = () => { inputEl.value = c; clearChips(); send(); };
    chipsEl.appendChild(el);
  });
}
function clearChips() { chipsEl.innerHTML = ''; }

// ─── PANEL UPDATE ───
function updatePanel(data) {
  for (const [k, v] of Object.entries(data)) {
    if (!v) continue;
    const idx = PM[k];
    if (idx === undefined) continue;
    const el   = document.getElementById('sv' + idx);
    const card = document.getElementById('sc' + idx);
    if (!el) continue;

    let val = String(v);

    // Combine type + city
    if (idx === 1) {
      const parts = [brief.type, brief.city].filter(Boolean);
      val = parts.join(' · ') || val;
    }
    // Combine contact fields
    if (idx === 6) {
      const parts = [];
      if (brief.whatsapp)  parts.push('📲 ' + brief.whatsapp);
      if (brief.instagram) parts.push('📸 ' + brief.instagram);
      if (brief.hours)     parts.push('🕐 ' + brief.hours);
      if (parts.length) val = parts.join('\n');
    }
    // Name
    if (idx === 0 && brief.name) val = brief.name;

    if (el.textContent !== val) {
      el.textContent = val;
      el.classList.add('filled');
      card.classList.add('lit');
    }
  }
}

// ─── PROGRESS ───
const PL = ['Empezando','Tu negocio','Tipo de negocio','Servicios','La vibe','Objetivos','Tu ventaja','Cliente ideal','Contacto','✓ Listo'];
function setProgress(step) {
  const pct = Math.min((step / 9) * 100, 100);
  document.getElementById('pbf').style.width = pct + '%';
}

// ─── SUMMARY ───
async function showSummary() {
  document.querySelectorAll('.sc').forEach(c => c.classList.add('lit'));
  setProgress(10);
  inputEl.placeholder = 'Formulario completado ✓';
  inputEl.disabled = true; sbEl.disabled = true;

  // ── Show loading card while we generate prompt ──
  const loadCard = document.createElement('div');
  loadCard.className = 'sum';
  loadCard.id = 'loadCard';
  loadCard.innerHTML = `
    <div class="sum-eye">Procesando</div>
    <div class="sum-h">Generando tu brief profesional…</div>
    <div style="display:flex;align-items:center;gap:10px;margin-top:16px;">
      <div style="display:flex;gap:5px;">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--blue);animation:tdBounce 1.2s ease-in-out infinite;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:var(--blue);animation:tdBounce 1.2s ease-in-out infinite;animation-delay:0.15s;"></div>
        <div style="width:8px;height:8px;border-radius:50%;background:var(--blue);animation:tdBounce 1.2s ease-in-out infinite;animation-delay:0.3s;"></div>
      </div>
      <span style="font-size:13px;color:var(--muted);">La IA está creando el prompt de diseño…</span>
    </div>`;
  msgsEl.appendChild(loadCard); scrollB();

  // ── 1. Generate professional design prompt ──
  const PROMPT_SYSTEM = `Eres el director creativo senior de NexWeb Studio, una plataforma premium de páginas web para negocios mexicanos. 
Basándote en la entrevista que acaba de hacer la IA con un cliente potencial, genera un PROMPT DE DISEÑO PROFESIONAL y extremadamente específico para construir su página web desde cero.

El prompt debe ser una sola instrucción fluida, detallada y accionable de 180-220 palabras. NO uses listas ni bullets. Redáctalo como un brief creativo de agencia de primer nivel.

Debe incluir obligatoriamente:
- Esencia y personalidad visual (3-4 adjetivos muy específicos)
- Paleta de colores exacta con referencias (ej: negro carbón #111, dorado viejo #c9a84c, crema #f5f0e8)
- Tipografía recomendada: fuente display para títulos + fuente para cuerpo
- Estructura de secciones en orden lógico de conversión
- Headline y subheadline sugeridos para el hero (copy real, no placeholder)
- Tono de voz del copy en toda la página
- Elementos visuales únicos para este nicho (texturas, íconos, animaciones)
- CTA principal y secundario con texto exacto
- Lo que diferencia visualmente esta página de cualquier otra del mismo nicho
- Referencias de mood: a qué marca internacional se debe parecer en calidad (sin copiar)

Escribe SOLO el prompt, sin introducción ni cierre. Directo. Que suene a brief de estudio de diseño de NYC.`;

  const interviewContext = history
    .filter(m => m.role === 'user' || m.role === 'assistant')
    .slice(-16)
    .map(m => (m.role==='user' ? 'Cliente' : 'Asistente') + ': ' + m.content.replace(/<!--.*?-->/gs,'').trim())
    .join('\n');

  let designPrompt = '';
  try {
    const pr = await fetch(GROQ_URL, {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        max_tokens: 600, temperature: 0.6,
        messages: [
          { role:'system', content: PROMPT_SYSTEM },
          { role:'user',   content: `Entrevista:\n${interviewContext}\n\nBrief extraído:\n${JSON.stringify(brief, null, 2)}` }
        ]
      })
    });
    const pd = await pr.json();
    designPrompt = pd.choices?.[0]?.message?.content?.trim() || '';
  } catch(e) { designPrompt = ''; }

  // ── 2. Save prospect to Supabase ──
  let savedOk = false;
  try {
    const _sb = (typeof supabase !== 'undefined') ? supabase.createClient(SB_URL, SB_KEY) : null;
    if(_sb) {
      const prospectData = {
        name:        brief.name  || 'Prospecto sin nombre',
        type:        brief.type  || '',
        city:        brief.city  || '',
        plan:        'basico',
        url:         '',
        status:      'prospecto',
        since:       new Date().toISOString().slice(0,10),
        access_code: Math.random().toString(36).substring(2,8).toUpperCase(),
        ref_code:    (brief.name||'PROSP').replace(/[^a-zA-Z0-9]/g,'').substring(0,8).toUpperCase(),
        is_founder:  false,
        notes:       JSON.stringify({ brief, designPrompt, source: 'formulario_onboarding' })
      };

      // Try with notes first
      let { error } = await _sb.from('clients').insert(prospectData);

      // If notes column doesn't exist, retry without it
      if(error && error.message && error.message.includes('notes')) {
        const { notes, ...dataWithoutNotes } = prospectData;
        const result2 = await _sb.from('clients').insert(dataWithoutNotes);
        error = result2.error;
      }

      savedOk = !error;
      if(error) console.error('Supabase error:', error.message);
    } else {
      console.warn('Supabase not loaded');
    }
  } catch(e) { console.error('Save failed:', e); savedOk = false; }

  // ── 3. Build WhatsApp message ──
  const waLines = [
    '🚀 *NUEVO PROSPECTO NEXWEB*', '',
    brief.name         ? `*Negocio:* ${brief.name}`          : '',
    brief.type         ? `*Tipo:* ${brief.type}`             : '',
    brief.city         ? `*Ciudad:* ${brief.city}`           : '',
    brief.services     ? `\n*Servicios:* ${brief.services}` : '',
    brief.goal         ? `*Objetivo:* ${brief.goal}`         : '',
    brief.vibe         ? `*Vibe:* ${brief.vibe}`             : '',
    brief.differentiator ? `*Diferenciador:* ${brief.differentiator}` : '',
    brief.target       ? `*Cliente ideal:* ${brief.target}`  : '',
    brief.whatsapp     ? `\n*WhatsApp:* ${brief.whatsapp}`  : '',
    brief.instagram    ? `*Instagram:* ${brief.instagram}`   : '',
    brief.hours        ? `*Horario:* ${brief.hours}`         : '',
    brief.hasLogo      ? `*Logo:* ${brief.hasLogo}`          : '',
    brief.colors       ? `*Colores:* ${brief.colors}`        : '',
    designPrompt       ? `\n🎨 *PROMPT DE DISEÑO:*\n${designPrompt}` : '',
  ].filter(Boolean).join('\n');

  // ── 4. Remove loader, show final card ──
  document.getElementById('loadCard')?.remove();

  const card = document.createElement('div');
  card.className = 'sum';
  card.innerHTML = `
    <div class="sum-eye">Perfil completo</div>
    <div class="sum-h">Todo listo para arrancar ✨</div>
    <div class="sum-p">Juan recibió tu información. Ya tiene el brief y el prompt de diseño personalizado para tu página. Te escribirá en menos de 24 horas.</div>

    <div class="sum-grid">
      ${brief.name  ? `<div class="si"><div class="si-l">Negocio</div><div class="si-v">${esc(brief.name)}</div></div>` : ''}
      ${brief.type  ? `<div class="si"><div class="si-l">Tipo</div><div class="si-v">${esc(brief.type)}</div></div>` : ''}
      ${brief.city  ? `<div class="si"><div class="si-l">Ciudad</div><div class="si-v">${esc(brief.city)}</div></div>` : ''}
      ${brief.goal  ? `<div class="si"><div class="si-l">Objetivo</div><div class="si-v">${esc(brief.goal)}</div></div>` : ''}
      ${brief.vibe  ? `<div class="si"><div class="si-l">Personalidad</div><div class="si-v">${esc(brief.vibe)}</div></div>` : ''}
      ${brief.differentiator ? `<div class="si"><div class="si-l">Diferenciador</div><div class="si-v">${esc(brief.differentiator)}</div></div>` : ''}
    </div>



    <div style="display:flex;gap:10px;margin-bottom:12px;">
      <a href="https://wa.me/12148011100?text=${encodeURIComponent(waLines)}"
         target="_blank" class="sum-btn" style="flex:1;">💬 Enviar a Juan</a>
    </div>
    <div class="sum-note">${savedOk ? '✅ Registrado como prospecto en NexWeb · Juan te escribirá pronto' : 'Juan te escribirá en menos de 24 horas ✓'}</div>`;

  msgsEl.appendChild(card); scrollB();
}

// ─── UTILS ───
function lock()   { inputEl.disabled = true;  sbEl.disabled = true;  }
function unlock() { inputEl.disabled = false; sbEl.disabled = false; inputEl.focus(); }
function scrollB(){ msgsEl.scrollTop = msgsEl.scrollHeight; }
function sleep(ms){ return new Promise(r => setTimeout(r, ms)); }
function esc(s)   { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(t)   { return t.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>'); }
function hk(e)    { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); send(); } }
function rsz(el)  {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  sbEl.disabled = !el.value.trim() || busy || done;
}

init();
